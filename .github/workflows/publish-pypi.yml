name: Publish to PyPI

# Manual "Run workflow" button (Actions tab). Builds the source distribution
# (sdist) and publishes it to PyPI via Trusted Publishing (OIDC) — no token is
# stored in the repo.
#
# Only the sdist is published (not a wheel): the custom build backend
# (_build_backend.py) bundles a platform-specific JDK at build time, so a
# CI-built wheel would be Linux-only and break Windows/macOS installs. The
# sdist carries no JDK (only the Bio-Formats JARs); the correct per-platform
# JDK is fetched when each user installs.
#
# The published version is whatever is in pyproject.toml — bump it before
# running, and make sure that version isn't already on PyPI (PyPI rejects
# re-uploads of an existing version).

on:
  workflow_dispatch:

jobs:
  build:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build & check sdist
        run: |
          python -m pip install --upgrade build twine
          python -m build --sdist
          twine check dist/*

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write          # required for Trusted Publishing (OIDC)
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # No password/token: authenticates via OIDC Trusted Publishing.
        # Uploads everything in dist/ (the sdist) to https://upload.pypi.org/legacy/
