[build-system]
requires = ["setuptools>=45", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "eubi-flow"
version = "0.1.2b1"
description = "Workflow DAG engine and Flow GUI for EuBI-Bridge."
readme = "README.md"
requires-python = ">=3.11,<3.13"
authors = [
    {name = "Bugra Özdemir", email = "bugraa.ozdemir@gmail.com"}
]
license = "MIT"
dependencies = [
    "eubi-bridge>=0.1.2b1",
]

classifiers = [
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
]

[tool.setuptools.packages.find]
where = ["."]
include = ["eubi_flow*"]

[project.urls]
Homepage = "https://github.com/Euro-BioImaging/EuBI-Bridge"
